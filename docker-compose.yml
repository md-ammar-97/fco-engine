version: "3.9"

services:
  fco-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        PUID: ${PUID}
        PGID: ${PGID}
    container_name: fco-api
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ${FCO_SHARED_HOST_PATH}:/shared/fco
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fco_net

  fco-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        PUID: ${PUID}
        PGID: ${PGID}
    container_name: fco-worker
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ${FCO_SHARED_HOST_PATH}:/shared/fco
    depends_on:
      fco-api:
        condition: service_healthy
    networks:
      - fco_net

networks:
  fco_net:
    external: true
    name: ${DOCKER_NETWORK_NAME}
